<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BioKauf">
<title>🌿 BioKauf</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #f7f3ec; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; overscroll-behavior: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  a:hover { opacity: 0.75; }
  input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  ::-webkit-scrollbar { display: none; }
  /* iOS safe area */
  .safe-bottom { padding-bottom: calc(90px + env(safe-area-inset-bottom)); }
  .tab-bar { padding-bottom: env(safe-area-inset-bottom, 0px); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ── CONSTANTS ─────────────────────────────────────────────────────── */
const SK = { favs:'bk_favs', week:'bk_week', budget:'bk_budget' };
const load = (k,fb) => { try { return JSON.parse(localStorage.getItem(k)) ?? fb; } catch { return fb; } };
const fmt = n => '\u20AC ' + Number(n).toFixed(2).replace('.',',');

const FOOD_EMOJI = { gurke:'🥒',tomate:'🍅',tomaten:'🍅',paprika:'🫑',apfel:'🍎',spinat:'🥬',karotte:'🥕',karotten:'🥕',avocado:'🥑',zucchini:'🥗',brokkoli:'🥦',salat:'🥬',zwiebel:'🧅',knoblauch:'🧄',kartoffel:'🥔',beere:'🫐',erdbeere:'🍓',banane:'🍌',orange:'🍊',zitrone:'🍋',pilze:'🍄',brot:'🍞',milch:'🥛',käse:'🧀',ei:'🥚',eier:'🥚',butter:'🧈',reis:'🍚',nudel:'🍝' };
const DROG_EMOJI = { shampoo:'🧴',duschgel:'🚿',seife:'🧼',zahnpasta:'🦷',deodorant:'💨',deo:'💨',creme:'💆',sonnencreme:'☀️',waschmittel:'🧺',windel:'👶',mundwasser:'💧',haarpflege:'💇',makeup:'💄',toilettenpapier:'🧻',taschentuch:'🤧',pflaster:'🩹' };
const NONFOOD_EMOJI = { schwamm:'🧽',besen:'🧹',kerze:'🕯️',topf:'🍳',pfanne:'🍳',glas:'🥃',becher:'☕',teller:'🍽️',flasche:'🍶',notizbuch:'📓',batterie:'🔋',glühbirne:'💡' };

const getEmoji = (q, cat) => {
  const k = (q||'').toLowerCase();
  const map = cat==='drogerie' ? DROG_EMOJI : cat==='nonfood' ? NONFOOD_EMOJI : FOOD_EMOJI;
  for (const [key,v] of Object.entries(map)) if (k.includes(key)) return v;
  return cat==='drogerie' ? '🧴' : cat==='nonfood' ? '📦' : '🥗';
};

const STORE_URLS = {
  'Alnatura Online':'https://www.alnatura.de/de-de/produkte/','Alnatura Filiale':'https://www.alnatura.de/de-de/einkaufen/maerkte/',
  'Denns Biomarkt':'https://www.dennsbiomarkt.de/','Rewe Bio':'https://www.rewe.de/angebote/bio-oeko/','Rewe':'https://www.rewe.de/',
  'dm':'https://www.dm.de/','dm Bio':'https://www.dm.de/marken/dmBio/','dm Drogerie':'https://www.dm.de/',
  'Rossmann':'https://www.rossmann.de/','Rossmann Naturkind':'https://www.rossmann.de/de/lebensmittel-naturkind/c/RS1000009',
  'Aldi Bio':'https://www.aldi-nord.de/sortiment/bio-produkte.html','Aldi':'https://www.aldi-nord.de/',
  'tegut':'https://www.tegut.com/','Reformhaus':'https://www.reformhaus.de/','Wochenmarkt':'https://www.marktsuche.de/',
  'Avocadostore':'https://www.avocadostore.de/','Ecco Verde':'https://www.ecco-verde.de/','Budni':'https://www.budni.de/',
  'Naturhaus':'https://www.naturhaus.de/','Memo':'https://www.memo.de/','Waschbär':'https://www.waschbaer.de/','IKEA':'https://www.ikea.com/de/',
};
const getStoreUrl = s => { if(!s) return null; for(const [k,u] of Object.entries(STORE_URLS)) if(s.toLowerCase().includes(k.toLowerCase())) return u; return null; };

const QUICK_FOOD    = ['Salatgurke','Tomaten','Paprika','Äpfel','Spinat','Karotten','Avocado','Brokkoli'];
const QUICK_DROG    = ['Shampoo','Duschgel','Zahnpasta','Sonnencreme','Deodorant','Waschmittel','Seife','Creme'];
const QUICK_NONFOOD = ['Mülltüten','Schwämme','Kerzen','Trinkflasche','Brotdose','Bienenwachstücher','Küchenrolle','Wäscheklammern'];

const CAT = {
  lebensmittel: { label:'Lebensmittel', icon:'🥦', color:'#3d5c3d', light:'#e8f5e9', stores:'Alnatura, Denns, tegut, Aldi Bio, Rewe Bio, Wochenmarkt', type:'bio Lebensmittel' },
  drogerie:     { label:'Drogerie',     icon:'🧴', color:'#6a4c93', light:'#f3e5f5', stores:'dm, Rossmann, Avocadostore, Ecco Verde, Budni, Reformhaus', type:'Naturkosmetik Drogerie' },
  nonfood:      { label:'Non Food',     icon:'📦', color:'#b5451b', light:'#fbe9e7', stores:'Avocadostore, Waschbär, Memo, Naturhaus, dm, IKEA', type:'nachhaltig ökologisch Haushalt' },
};

let _toast;
function useToast() {
  const [msg, setMsg] = useState(null);
  _toast = useCallback(m => { setMsg(m); setTimeout(() => setMsg(null), 2600); }, []);
  return msg;
}

/* ── INLINE PRICE EDITOR ────────────────────────────────────────────── */
function PriceDisplay({ price, color, onSave }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState('');
  const ref = useRef(null);

  const startEdit = () => { setVal(price.toFixed(2)); setEditing(true); setTimeout(() => ref.current && ref.current.select(), 80); };
  const commit = () => {
    const p = parseFloat(val.replace(',', '.'));
    if (!isNaN(p) && p >= 0) { onSave(p); _toast('✏️ Preis aktualisiert'); }
    setEditing(false);
  };
  const onKey = e => { if (e.key === 'Enter') { e.preventDefault(); commit(); } if (e.key === 'Escape') setEditing(false); };

  if (editing) return (
    <div style={{display:'flex',alignItems:'center',gap:4,justifyContent:'flex-end'}}>
      <span style={{fontSize:14,color:'#aaa'}}>€</span>
      <input ref={ref} value={val} onChange={e => setVal(e.target.value)} onBlur={commit} onKeyDown={onKey}
        type="decimal" inputMode="decimal"
        style={{width:68,padding:'4px 6px',border:`2px solid ${color}`,borderRadius:8,fontSize:16,fontWeight:700,textAlign:'right',fontFamily:'inherit',outline:'none',color,background:'#fff'}} />
    </div>
  );

  return (
    <div onClick={startEdit} style={{cursor:'pointer',display:'inline-flex',alignItems:'center',gap:5,WebkitUserSelect:'none',userSelect:'none'}}>
      <span style={{fontSize:20,fontWeight:700,color}}>{fmt(price)}</span>
      <span style={{fontSize:12,opacity:0.45}}>✏️</span>
    </div>
  );
}

/* ── RESULT CARD ────────────────────────────────────────────────────── */
function ResultCard({ item, isBest, isFav, inWk, onFav, onWeek, onPriceChange, catColor, catLight }) {
  return (
    <div style={{background:'#fff',borderRadius:14,padding:'13px 14px',marginBottom:10,boxShadow:'0 3px 14px rgba(0,0,0,0.06)',display:'flex',gap:12,alignItems:'flex-start',borderLeft:isBest?'4px solid #c9a84c':'4px solid #e8e0d0',position:'relative'}}>
      {isBest && <span style={{position:'absolute',top:9,right:10,background:'#c9a84c',color:'#3d5c3d',fontSize:9,fontWeight:700,padding:'2px 8px',borderRadius:20,textTransform:'uppercase'}}>🏆 Bester Preis</span>}
      <div style={{width:42,height:42,borderRadius:10,background:item.type==='online'?catLight:'#fff3e0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{item.emoji}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:600,fontSize:14,marginBottom:1}}>{item.name}</div>
        <div style={{fontSize:12,color:'#666'}}>{item.store}</div>
        <div style={{display:'flex',gap:5,marginTop:4,flexWrap:'wrap'}}>
          <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:20,textTransform:'uppercase',background:catLight,color:catColor}}>Öko</span>
          <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:20,textTransform:'uppercase',background:item.type==='online'?'#e3f2fd':'#fff3e0',color:item.type==='online'?'#1565c0':'#e65100'}}>{item.type==='online'?'🛒 Online':'🏪 Lokal'}</span>
        </div>
        {item.url && <a href={item.url} target="_blank" rel="noopener noreferrer" style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:11,color:catColor,textDecoration:'none',background:catLight,padding:'2px 8px',borderRadius:20,marginTop:5,fontWeight:600}}>↗ {item.source||'Quelle'}</a>}
      </div>
      <div style={{textAlign:'right',flexShrink:0}}>
        <PriceDisplay price={item.price} color={catColor} onSave={onPriceChange} />
        <div style={{fontSize:11,color:'#aaa',marginTop:1}}>{item.unit}</div>
        <div style={{display:'flex',gap:5,marginTop:6,justifyContent:'flex-end'}}>
          <button onClick={onFav} style={{width:32,height:32,border:isFav?'1.5px solid #c9a84c':'1.5px solid #e8e0d0',background:isFav?'#fff3cd':'transparent',borderRadius:8,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>⭐</button>
          <button onClick={onWeek} style={{width:32,height:32,border:inWk?`1.5px solid ${catColor}`:'1.5px solid #e8e0d0',background:inWk?catLight:'transparent',borderRadius:8,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>📋</button>
        </div>
      </div>
    </div>
  );
}

/* ── SEARCH PANEL ───────────────────────────────────────────────────── */
function SearchPanel({ category, favorites, weekNeeds, setFavorites, setWeekNeeds }) {
  const cfg = CAT[category];
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [lastQuery, setLastQuery] = useState('');
  const [filter, setFilter] = useState('alle');
  const [showManual, setShowManual] = useState(false);
  const [manual, setManual] = useState({name:'',price:'',store:'',type:'lokal',unit:'',url:''});
  const QUICK = category==='lebensmittel' ? QUICK_FOOD : category==='drogerie' ? QUICK_DROG : QUICK_NONFOOD;

  const doSearch = async q => {
    if (!q.trim()) return;
    setLastQuery(q); setResults([]); setLoading(true); setFilter('alle');
    try {
      const prompt = `Du bist ein Preisrechercheur für Deutschland 2025 für ${cfg.type} Produkte. Suche realistische Preise für: "${q}".
Gib genau 7 Angebote als JSON-Array. Anbieter: ${cfg.stores}.
Antworte NUR mit JSON-Array (keine Backticks):
[{"name":"...","store":"...","price":1.99,"unit":"Stk","type":"online","emoji":"${cfg.icon}","url":"https://...","source":"dm.de","note":"optional"}]
Regeln: type exakt "online" oder "lokal". Nur ökologische/nachhaltige Produkte. Realistische Preise Deutschland 2025. Aufsteigend nach Preis.`;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1200, messages:[{role:'user',content:prompt}] })
      });
      const data = await res.json();
      const text = (data.content||[]).map(i=>i.text||'').join('');
      const match = text.match(/\[[\s\S]*\]/);
      if (!match) throw new Error();
      const parsed = JSON.parse(match[0]);
      setResults(parsed.map(r => ({
        ...r, category,
        emoji: r.emoji || getEmoji(q, category),
        url: r.url || getStoreUrl(r.store) || null,
        source: r.source || (r.url ? r.url.replace('https://','').replace('www.','').split('/')[0] : null)
      })));
    } catch { setResults(getFallback(q, category)); }
    setLoading(false);
  };

  const getFallback = (q, cat) => {
    const e = getEmoji(q, cat);
    if (cat === 'drogerie') return [
      {name:`Naturkind Bio ${q}`,store:'Rossmann',price:2.49,unit:'250ml',type:'lokal',emoji:e,url:'https://www.rossmann.de/',source:'rossmann.de',category:cat},
      {name:`Alverde ${q}`,store:'dm',price:3.45,unit:'200ml',type:'lokal',emoji:e,url:'https://www.dm.de/',source:'dm.de',category:cat},
      {name:`dm Bio ${q}`,store:'dm Drogerie',price:2.99,unit:'300ml',type:'lokal',emoji:e,url:'https://www.dm.de/marken/dmBio/',source:'dm.de',category:cat},
      {name:`Lavera ${q}`,store:'Ecco Verde',price:4.95,unit:'200ml',type:'online',emoji:e,url:'https://www.ecco-verde.de/',source:'ecco-verde.de',category:cat},
      {name:`Weleda ${q}`,store:'dm Drogerie',price:5.99,unit:'200ml',type:'lokal',emoji:e,url:'https://www.dm.de/',source:'dm.de',category:cat},
      {name:`Logona ${q}`,store:'Reformhaus',price:6.99,unit:'200ml',type:'lokal',emoji:e,url:'https://www.reformhaus.de/',source:'reformhaus.de',category:cat},
      {name:`Sante ${q}`,store:'Avocadostore',price:7.99,unit:'200ml',type:'online',emoji:e,url:'https://www.avocadostore.de/',source:'avocadostore.de',category:cat},
    ];
    if (cat === 'nonfood') return [
      {name:`Öko ${q}`,store:'dm',price:1.99,unit:'Stk',type:'lokal',emoji:e,url:'https://www.dm.de/',source:'dm.de',category:cat},
      {name:`Recycling ${q}`,store:'Rossmann',price:2.99,unit:'Stk',type:'lokal',emoji:e,url:'https://www.rossmann.de/',source:'rossmann.de',category:cat},
      {name:`Nachhaltig ${q}`,store:'Avocadostore',price:3.99,unit:'Stk',type:'online',emoji:e,url:'https://www.avocadostore.de/',source:'avocadostore.de',category:cat},
      {name:`Alnatura ${q}`,store:'Alnatura Filiale',price:3.49,unit:'Stk',type:'lokal',emoji:e,url:'https://www.alnatura.de/',source:'alnatura.de',category:cat},
      {name:`Öko ${q}`,store:'Waschbär',price:4.95,unit:'Stk',type:'online',emoji:e,url:'https://www.waschbaer.de/',source:'waschbaer.de',category:cat},
      {name:`Fair Trade ${q}`,store:'Memo',price:5.49,unit:'Stk',type:'online',emoji:e,url:'https://www.memo.de/',source:'memo.de',category:cat},
      {name:`Premium ${q}`,store:'Naturhaus',price:6.99,unit:'Stk',type:'online',emoji:e,url:'https://www.naturhaus.de/',source:'naturhaus.de',category:cat},
    ];
    return [
      {name:`Bio ${q}`,store:'Aldi Bio',price:0.89,unit:'Stk',type:'lokal',emoji:e,url:'https://www.aldi-nord.de/sortiment/bio-produkte.html',source:'aldi-nord.de',category:cat},
      {name:`Naturkind Bio ${q}`,store:'Rossmann',price:0.99,unit:'450g',type:'lokal',emoji:e,url:'https://www.rossmann.de/',source:'rossmann.de',category:cat},
      {name:`Bio ${q} (Demeter)`,store:'Alnatura Online',price:1.29,unit:'500g',type:'online',emoji:e,url:'https://www.alnatura.de/de-de/produkte/',source:'alnatura.de',category:cat},
      {name:`Bio ${q} regional`,store:'tegut',price:1.49,unit:'500g',type:'lokal',emoji:e,url:'https://www.tegut.com/',source:'tegut.com',category:cat},
      {name:`Bio ${q} Demeter`,store:'Denns Biomarkt',price:1.79,unit:'500g',type:'lokal',emoji:e,url:'https://www.dennsbiomarkt.de/',source:'dennsbiomarkt.de',category:cat},
      {name:`Bio ${q} Saison`,store:'Wochenmarkt',price:1.99,unit:'500g',type:'lokal',emoji:e,url:'https://www.marktsuche.de/',source:'marktsuche.de',category:cat},
      {name:`Bio ${q} Premium`,store:'Rewe Bio',price:2.19,unit:'500g',type:'online',emoji:e,url:'https://www.rewe.de/angebote/bio-oeko/',source:'rewe.de',category:cat},
    ];
  };

  const updateResultPrice = (idx, newPrice, item) => {
    setResults(r => r.map((x,i) => i===idx ? {...x,price:newPrice} : x));
    setFavorites(f => f.map(x => x.name===item.name&&x.store===item.store ? {...x,price:newPrice} : x));
    setWeekNeeds(w => w.map(x => x.name===item.name&&x.store===item.store ? {...x,price:newPrice} : x));
  };

  const filtered = (() => {
    let list = [...results];
    if (filter==='online') list = list.filter(r=>r.type==='online');
    if (filter==='lokal') list = list.filter(r=>r.type==='lokal');
    if (filter==='günstig') list = [...list].sort((a,b)=>a.price-b.price).slice(0,3);
    return list;
  })();

  const getRealIdx = item => results.findIndex(r=>r.name===item.name&&r.store===item.store);
  const cheapest = filtered.length ? Math.min(...filtered.map(r=>r.price)) : null;
  const isFav = item => favorites.some(f=>f.name===item.name&&f.store===item.store);
  const inWk  = item => weekNeeds.some(w=>w.name===item.name&&w.store===item.store);
  const toggleFav = item => { if(isFav(item)){setFavorites(f=>f.filter(x=>!(x.name===item.name&&x.store===item.store)));_toast('⭐ Aus Favoriten entfernt');}else{setFavorites(f=>[...f,{...item}]);_toast('⭐ Zu Favoriten hinzugefügt');} };
  const toggleWk  = item => { if(inWk(item)){setWeekNeeds(w=>w.filter(x=>!(x.name===item.name&&x.store===item.store)));_toast('📋 Entfernt');}else{setWeekNeeds(w=>[...w,{...item,qty:1,bought:false}]);_toast('📋 Zum Wochenbedarf hinzugefügt');} };

  const addManual = () => {
    if (!manual.name.trim()) { _toast('⚠️ Produktname fehlt'); return; }
    const price = parseFloat(manual.price.replace(',','.'));
    if (isNaN(price)) { _toast('⚠️ Preis fehlt'); return; }
    const url = manual.url || getStoreUrl(manual.store) || null;
    setResults(r => [{...manual,price,category,emoji:getEmoji(manual.name,category),manual:true,url,source:url?url.replace('https://','').replace('www.','').split('/')[0]:null},...r]);
    setManual({name:'',price:'',store:'',type:'lokal',unit:'',url:''});
    setShowManual(false);
    _toast(`✅ "${manual.name}" hinzugefügt`);
  };

  const FL = {fontSize:11,color:'#888',display:'block',marginBottom:3,fontWeight:600,textTransform:'uppercase',letterSpacing:0.5};
  const FC = {width:'100%',padding:'10px 11px',border:'1.5px solid #e8e0d0',borderRadius:10,fontSize:16,fontFamily:'inherit',outline:'none',boxSizing:'border-box',background:'#fff'};

  return (
    <div>
      <div style={{background:cfg.light,borderRadius:14,padding:'12px 14px',marginBottom:12,display:'flex',alignItems:'center',gap:12,borderLeft:`4px solid ${cfg.color}`}}>
        <span style={{fontSize:30}}>{cfg.icon}</span>
        <div>
          <div style={{fontFamily:'Georgia,serif',fontSize:16,fontWeight:700,color:cfg.color}}>{cfg.label}</div>
          <div style={{fontSize:11,color:'#666'}}>{cfg.stores.split(',').slice(0,3).join(', ')}…</div>
        </div>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:10}}>
        <div style={{flex:1,position:'relative'}}>
          <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:16,opacity:0.4,pointerEvents:'none'}}>🔍</span>
          <input style={{width:'100%',padding:'13px 12px 13px 38px',border:`1.5px solid ${cfg.color}60`,borderRadius:50,fontSize:16,fontFamily:'inherit',outline:'none',boxSizing:'border-box',background:'#fff'}}
            value={query} onChange={e=>setQuery(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&doSearch(query)}
            placeholder={`${cfg.label} suchen…`} />
        </div>
        <button onClick={()=>doSearch(query)} style={{padding:'13px 16px',background:cfg.color,color:'#fff',border:'none',borderRadius:50,fontSize:14,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',WebkitAppearance:'none'}}>Suchen</button>
      </div>

      {results.length===0 && !loading && (
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14}}>
          {QUICK.map(q=>(
            <button key={q} onClick={()=>{setQuery(q);doSearch(q);}}
              style={{padding:'8px 14px',borderRadius:20,fontSize:13,fontWeight:600,background:cfg.light,color:cfg.color,cursor:'pointer',border:`1.5px solid ${cfg.color}40`,fontFamily:'inherit',WebkitAppearance:'none'}}>
              {getEmoji(q,category)} {q}
            </button>
          ))}
        </div>
      )}

      {loading && (
        <div style={{textAlign:'center',padding:'36px 0'}}>
          <div style={{width:38,height:38,border:`3px solid ${cfg.light}`,borderTopColor:cfg.color,borderRadius:'50%',animation:'spin 0.8s linear infinite',margin:'0 auto 12px'}}/>
          <div style={{color:'#888',fontSize:14}}>Suche für „{lastQuery}"…</div>
        </div>
      )}

      {!loading && results.length>0 && (<>
        <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:4,marginBottom:10}}>
          {[['alle','Alle'],['online','🛒 Online'],['lokal','🏪 Lokal'],['günstig','💸 Günstigste']].map(([m,lb])=>(
            <button key={m} onClick={()=>setFilter(m)}
              style={{padding:'6px 14px',borderRadius:20,fontSize:13,fontWeight:600,background:filter===m?cfg.color:cfg.light,color:filter===m?'#fff':cfg.color,cursor:'pointer',border:`1.5px solid ${filter===m?cfg.color:cfg.color+'40'}`,fontFamily:'inherit',whiteSpace:'nowrap',WebkitAppearance:'none',flexShrink:0}}>
              {lb}
            </button>
          ))}
        </div>

        <div style={{background:cfg.light,borderLeft:`3px solid ${cfg.color}`,borderRadius:10,padding:'9px 12px',fontSize:12,color:cfg.color,marginBottom:10,lineHeight:1.5}}>
          <strong>🤖 KI-Recherche:</strong> Preis <strong>✏️</strong> antippen zum Korrigieren · <strong>↗ Quelle</strong> öffnet Anbieter
        </div>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>

        </div>
      </>)}

      {results.length===0 && !loading && (
        <div style={{textAlign:'center',marginTop:8}}>
          <button onClick={()=>setShowManual(v=>!v)} style={{padding:'10px 20px',border:'none',borderRadius:50,fontSize:14,fontWeight:700,fontFamily:'inherit',cursor:'pointer',background:'#8b6f47',color:'#fff',WebkitAppearance:'none'}}>✏️ Manuell eintragen</button>
        </div>

      {showManual && (
        <div style={{background:'#fdf8f2',border:'1.5px dashed #8b6f47',borderRadius:14,padding:14,marginTop:10}}>

          <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:8,marginBottom:8}}>
            <div><label style={FL}>Produktname</label><input style={FC} value={manual.name} onChange={e=>setManual(m=>({...m,name:e.target.value}))} placeholder={`Bio ${QUICK[0]}`}/></div>
            <div><label style={FL}>Preis (€)</label><input style={FC} type="text" inputMode="decimal" value={manual.price} onChange={e=>setManual(m=>({...m,price:e.target.value}))} placeholder="2.99"/></div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:8}}>
            <div><label style={FL}>Anbieter</label><input style={FC} value={manual.store} onChange={e=>setManual(m=>({...m,store:e.target.value}))} placeholder="dm…"/></div>
            <div><label style={FL}>Typ</label>
              <select style={{...FC,WebkitAppearance:'none'}} value={manual.type} onChange={e=>setManual(m=>({...m,type:e.target.value}))}>

                <option value="online">🛒 Online</option>
              </select>
            </div>
            <div><label style={FL}>Einheit</label><input style={FC} value={manual.unit} onChange={e=>setManual(m=>({...m,unit:e.target.value}))} placeholder="250ml"/></div>
          </div>
          <div style={{marginBottom:10}}><label style={FL}>Quelle-Link (optional)</label><input style={FC} value={manual.url} onChange={e=>setManual(m=>({...m,url:e.target.value}))} placeholder="https://…" type="url"/></div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={addManual} style={{padding:'10px 18px',border:'none',borderRadius:50,fontSize:14,fontWeight:700,fontFamily:'inherit',cursor:'pointer',background:cfg.color,color:'#fff',WebkitAppearance:'none'}}>✓ Hinzufügen</button>
            <button onClick={()=>setShowManual(false)} style={{padding:'10px 18px',border:'none',borderRadius:50,fontSize:14,fontWeight:700,fontFamily:'inherit',cursor:'pointer',background:'#e8e0d0',color:'#444',WebkitAppearance:'none'}}>Abbrechen</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── MAIN APP ───────────────────────────────────────────────────────── */
function BioKauf() {
  const [tab, setTab] = useState('lebensmittel');
  const [favorites, setFavorites] = useState(()=>load(SK.favs,[]));
  const [weekNeeds, setWeekNeeds] = useState(()=>load(SK.week,[]));
  const [budget, setBudgetVal] = useState(()=>load(SK.budget,0));
  const [budgetInput, setBudgetInput] = useState('');
  const toastMsg = useToast();

  useEffect(()=>{ localStorage.setItem(SK.favs, JSON.stringify(favorites)); }, [favorites]);
  useEffect(()=>{ localStorage.setItem(SK.week, JSON.stringify(weekNeeds)); }, [weekNeeds]);
  useEffect(()=>{ localStorage.setItem(SK.budget, JSON.stringify(budget)); }, [budget]);

  const updateFavPrice = (item, p) => {
    setFavorites(f=>f.map(x=>x.name===item.name&&x.store===item.store?{...x,price:p}:x));
    setWeekNeeds(w=>w.map(x=>x.name===item.name&&x.store===item.store?{...x,price:p}:x));
    _toast('✏️ Preis aktualisiert');
  };
  const updateWeekPrice = (idx, p) => {
    const item = weekNeeds[idx];
    setWeekNeeds(w=>w.map((x,i)=>i===idx?{...x,price:p}:x));
    setFavorites(f=>f.map(x=>x.name===item.name&&x.store===item.store?{...x,price:p}:x));
    _toast('✏️ Preis aktualisiert');
  };

  const changeQty    = (idx,d) => setWeekNeeds(w=>w.map((x,i)=>i===idx?{...x,qty:Math.max(1,(x.qty||1)+d)}:x));
  const removeWeek   = (idx) => { const n=weekNeeds[idx].name; setWeekNeeds(w=>w.filter((_,i)=>i!==idx)); _toast(`🗑️ "${n}" entfernt`); };
  const toggleBought = (idx) => setWeekNeeds(w=>w.map((x,i)=>i===idx?{...x,bought:!x.bought}:x));
  const resetBought  = () => { setWeekNeeds(w=>w.map(x=>({...x,bought:false}))); _toast('🔄 Alle zurückgesetzt'); };

  const weekTotal   = weekNeeds.reduce((s,w)=>s+w.price*(w.qty||1),0);
  const boughtTotal = weekNeeds.filter(w=>w.bought).reduce((s,w)=>s+w.price*(w.qty||1),0);
  const remain   = budget - weekTotal;
  const pct      = budget>0 ? Math.min((weekTotal/budget)*100,100) : 0;
  const boughtPct= weekTotal>0 ? (boughtTotal/weekTotal)*100 : 0;
  const weekBycat = {
    lebensmittel: weekNeeds.filter(w=>!w.category||w.category==='lebensmittel'),
    drogerie:     weekNeeds.filter(w=>w.category==='drogerie'),
    nonfood:      weekNeeds.filter(w=>w.category==='nonfood'),
  };
  const inWk = item => weekNeeds.some(w=>w.name===item.name&&w.store===item.store);
  const SL = cat => { const c=CAT[cat]||CAT.lebensmittel; return {display:'inline-flex',alignItems:'center',gap:3,fontSize:11,color:c.color,textDecoration:'none',background:c.light,padding:'2px 8px',borderRadius:20,marginTop:4,fontWeight:600}; };

  const TABS = [['lebensmittel','🥦','Lebens.'],['drogerie','🧴','Drogerie'],['nonfood','📦','Non Food'],['favoriten','⭐','Favoriten'],['wochenbedarf','📋','Woche'],['budget','💰','Budget']];
  const BtnStyle = {border:'none',borderRadius:50,fontFamily:'inherit',cursor:'pointer',WebkitAppearance:'none'};

  return (
    <div style={{fontFamily:"-apple-system,'Segoe UI',system-ui,sans-serif",background:'#f7f3ec',minHeight:'100vh',maxWidth:540,margin:'0 auto'}}>

      {/* HEADER */}
      <header style={{background:'#3d5c3d',color:'#f7f3ec',padding:'14px 16px 11px',paddingTop:'calc(14px + env(safe-area-inset-top, 0px))',position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 14px rgba(0,0,0,0.2)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:26}}>🌿</span>
          <div>
            <div style={{fontFamily:'Georgia,serif',fontSize:20,fontWeight:700}}>BioKauf</div>
            <div style={{fontSize:10,opacity:0.55,letterSpacing:1,textTransform:'uppercase'}}>Dein nachhaltiger Einkaufsplaner</div>
          </div>
        </div>
      </header>

      {/* TABS */}
      <div className="tab-bar" style={{background:'#e8e0d0',padding:'4px',display:'flex',gap:3,overflowX:'auto',position:'sticky',top:56,zIndex:99}}>
        {TABS.map(([id,ic,lb]) => {
          const cfg = CAT[id]; const active = tab===id;
          return (
            <button key={id} onClick={()=>setTab(id)}
              style={{...BtnStyle,flex:'0 0 auto',padding:'8px 10px',borderRadius:9,fontSize:10,fontWeight:700,background:active?(cfg?cfg.color:'#3d5c3d'):'transparent',color:active?'#fff':'#888',display:'flex',flexDirection:'column',alignItems:'center',gap:2,minWidth:60,whiteSpace:'nowrap'}}>
              <span style={{fontSize:15}}>{ic}</span>{lb}
            </button>
          );
        })}
      </div>

      {/* MAIN */}
      <main className="safe-bottom" style={{padding:'13px 13px 0'}}>

        {tab==='lebensmittel' && <SearchPanel category="lebensmittel" favorites={favorites} weekNeeds={weekNeeds} setFavorites={setFavorites} setWeekNeeds={setWeekNeeds}/>}
        {tab==='drogerie'     && <SearchPanel category="drogerie"     favorites={favorites} weekNeeds={weekNeeds} setFavorites={setFavorites} setWeekNeeds={setWeekNeeds}/>}
        {tab==='nonfood'      && <SearchPanel category="nonfood"      favorites={favorites} weekNeeds={weekNeeds} setFavorites={setFavorites} setWeekNeeds={setWeekNeeds}/>}

        {/* FAVORITEN */}
        {tab==='favoriten' && (<>
          <div style={{fontFamily:'Georgia,serif',fontSize:18,fontWeight:700,color:'#3d5c3d',margin:'4px 0 12px'}}>⭐ Meine Favoriten</div>
          {favorites.length===0 ? (
            <div style={{textAlign:'center',padding:'44px 20px'}}><div style={{fontSize:52}}>⭐</div><div style={{fontFamily:'Georgia,serif',fontSize:17,color:'#3d5c3d',margin:'10px 0 5px'}}>Noch keine Favoriten</div><div style={{color:'#aaa',fontSize:13}}>Markiere Produkte in den Suchbereichen.</div></div>
          ) : Object.entries(CAT).map(([cat,cfg])=>{
            const items = favorites.filter(f=>(f.category||'lebensmittel')===cat);
            if (!items.length) return null;
            return (<div key={cat} style={{marginBottom:6}}>
              <div style={{fontSize:12,fontWeight:700,color:cfg.color,background:cfg.light,padding:'4px 12px',borderRadius:8,marginBottom:8,display:'inline-block'}}>{cfg.icon} {cfg.label}</div>
              {items.map((f,i)=>(
                <div key={i} style={{background:'#fff',borderRadius:13,padding:'12px 13px',marginBottom:8,boxShadow:'0 2px 10px rgba(0,0,0,0.06)',display:'flex',gap:11,alignItems:'center'}}>
                  <div style={{fontSize:24}}>{f.emoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13}}>{f.name}</div>
                    <div style={{fontSize:11,color:'#aaa'}}>{f.store} · {f.type==='online'?'🛒 Online':'🏪 Lokal'}</div>
                    {f.url && <a href={f.url} target="_blank" rel="noopener noreferrer" style={SL(f.category||'lebensmittel')}>↗ {f.source||'Quelle'}</a>}
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <PriceDisplay price={f.price} color={cfg.color} onSave={p=>updateFavPrice(f,p)} />
                    <div style={{fontSize:11,color:'#aaa',marginTop:1}}>{f.unit}</div>
                    <div style={{display:'flex',gap:5,marginTop:5,justifyContent:'flex-end'}}>
                      <button style={{width:32,height:32,border:inWk(f)?`1.5px solid ${cfg.color}`:'1.5px solid #e8e0d0',background:inWk(f)?cfg.light:'transparent',borderRadius:7,cursor:'pointer',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center'}}
                        onClick={()=>{if(!inWk(f)){setWeekNeeds(w=>[...w,{...f,qty:1,bought:false}]);_toast('📋 Zum Wochenbedarf');}else _toast('Bereits drin');}}>📋</button>
                      <button style={{width:32,height:32,border:'1.5px solid #e8e0d0',background:'transparent',borderRadius:7,cursor:'pointer',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center'}}
                        onClick={()=>{setFavorites(fv=>fv.filter(x=>!(x.name===f.name&&x.store===f.store)));_toast('🗑️ Entfernt');}}>🗑️</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>);
          })}
        </>)}

        {/* WOCHENBEDARF */}
        {tab==='wochenbedarf' && (<>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',margin:'4px 0 8px'}}>
            <div style={{fontFamily:'Georgia,serif',fontSize:18,fontWeight:700,color:'#3d5c3d'}}>📋 Wochenbedarf</div>
            {weekNeeds.some(w=>w.bought) && <button onClick={resetBought} style={{...BtnStyle,padding:'6px 14px',fontSize:12,fontWeight:700,background:'#e8e0d0',color:'#666'}}>🔄 Zurücksetzen</button>}
          </div>
          <div style={{background:'#e8f5e9',borderLeft:'3px solid #5a7a5a',borderRadius:10,padding:'9px 12px',fontSize:12,color:'#3d5c3d',marginBottom:12,lineHeight:1.5}}>
            Menge einstellen, Preis <strong>✏️</strong> antippen zum Korrigieren, Gekauftes abhaken.
          </div>

          {weekNeeds.length===0 ? (
            <div style={{textAlign:'center',padding:'44px 20px'}}><div style={{fontSize:52}}>🛒</div><div style={{fontFamily:'Georgia,serif',fontSize:17,color:'#3d5c3d',margin:'10px 0 5px'}}>Kein Wochenbedarf</div><div style={{color:'#aaa',fontSize:13}}>Füge Produkte aus den Suchbereichen hinzu.</div></div>
          ) : (<>
            {Object.entries(CAT).map(([cat,cfg])=>{
              const items = weekBycat[cat]||[];
              if (!items.length) return null;
              return (<div key={cat} style={{marginBottom:8}}>
                <div style={{fontSize:11,fontWeight:700,color:cfg.color,background:cfg.light,padding:'3px 11px',borderRadius:7,marginBottom:7,display:'inline-block'}}>{cfg.icon} {cfg.label}</div>
                {items.map(w=>{
                  const gi = weekNeeds.findIndex(x=>x.name===w.name&&x.store===w.store);
                  return (
                    <div key={gi} style={{background:'#fff',borderRadius:13,padding:'11px 12px',marginBottom:7,boxShadow:'0 2px 10px rgba(0,0,0,0.06)',opacity:w.bought?0.65:1,transition:'opacity 0.2s',borderLeft:`3px solid ${w.bought?cfg.color:'#e8e0d0'}`}}>
                      <div style={{display:'flex',gap:8,alignItems:'center'}}>
                        <div onClick={()=>toggleBought(gi)} style={{width:28,height:28,borderRadius:8,border:w.bought?`2px solid ${cfg.color}`:'2px solid #ccc',background:w.bought?cfg.color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,transition:'all 0.15s'}}>
                          {w.bought && <span style={{color:'#fff',fontSize:14,lineHeight:1}}>✓</span>}
                        </div>
                        <div style={{fontSize:19,flexShrink:0}}>{w.emoji}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:13,textDecoration:w.bought?'line-through':'none',color:w.bought?'#aaa':'#2a2a2a'}}>{w.name}</div>
                          <div style={{fontSize:11,color:'#aaa'}}>{w.store}</div>

                        </div>
                        <div style={{display:'flex',gap:5,alignItems:'center',flexShrink:0}}>
                          <div style={{display:'flex',alignItems:'center',gap:3}}>
                            <button onClick={()=>changeQty(gi,-1)} style={{width:28,height:28,border:'1.5px solid #e8e0d0',background:'#fff',borderRadius:7,fontSize:18,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#3d5c3d',lineHeight:1,WebkitAppearance:'none'}}>−</button>

                          </div>
                          <div style={{textAlign:'right',minWidth:66}}>
                            <PriceDisplay price={w.price} color={cfg.color} onSave={p=>updateWeekPrice(gi,p)} />
                            <div style={{fontSize:9,color:'#ccc',marginTop:1}}>/Stk · {fmt(w.price*(w.qty||1))} ges.</div>

                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>);

            <div style={{background:'#fff',borderRadius:13,overflow:'hidden',boxShadow:'0 3px 14px rgba(0,0,0,0.07)',marginTop:4}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 15px',borderBottom:'1px solid #f0ebe2'}}>
                <div style={{display:'flex',alignItems:'center',gap:7}}><div style={{width:20,height:20,borderRadius:5,background:'#3d5c3d',display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:'#fff',fontSize:12}}>✓</span></div><span style={{fontSize:13,fontWeight:600,color:'#3d5c3d'}}>Bereits gekauft</span></div>
                <span style={{fontSize:18,fontWeight:700,color:'#3d5c3d'}}>{fmt(boughtTotal)}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 15px',borderBottom:'1px solid #f0ebe2'}}>
                <div style={{display:'flex',alignItems:'center',gap:7}}><div style={{width:20,height:20,borderRadius:5,background:'#e8e0d0',display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:'#aaa',fontSize:12}}>○</span></div><span style={{fontSize:13,fontWeight:600,color:'#888'}}>Noch offen</span></div>
                <span style={{fontSize:18,fontWeight:700,color:'#888'}}>{fmt(weekTotal-boughtTotal)}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 15px',background:'#3d5c3d'}}>
                <span style={{fontWeight:700,color:'#f7f3ec',fontSize:15}}>Gesamt / Woche</span>
                <span style={{fontSize:22,fontWeight:700,color:'#f7f3ec'}}>{fmt(weekTotal)}</span>

            </div>

            {weekTotal>0 && (
              <div style={{marginTop:10}}>

          {Object.entries(CAT).map(([cat,cfg])=>{

            const catTotal = items.reduce((s,w)=>s+w.price*(w.qty||1),0);

              {items.map((w,i)=>{
                const gi = weekNeeds.findIndex(x=>x.name===w.name&&x.store===w.store);
                return (<div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 13px',borderBottom:i<items.length-1?'1px solid #f0ebe2':'none',background:w.bought?'#f8fcf8':'#fff'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,textDecoration:w.bought?'line-through':'none',color:w.bought?'#aaa':'#2a2a2a'}}>{w.emoji} {w.name}</div>
                    <div style={{fontSize:11,color:'#aaa'}}>{w.qty}× · {w.store}{w.bought?' ✓':''}</div>
                    {w.url && <a href={w.url} target="_blank" rel="noopener noreferrer" style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:10,color:cfg.color,textDecoration:'none',background:cfg.light,padding:'1px 7px',borderRadius:20,marginTop:2,fontWeight:600}}>↗ {w.source||'Quelle'}</a>}
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <PriceDisplay price={w.price} color={w.bought?'#5a7a5a':cfg.color} onSave={p=>updateWeekPrice(gi,p)} />
                    <div style={{fontSize:10,color:'#ccc'}}>× {w.qty} = {fmt(w.price*(w.qty||1))}</div>
                  </div>
                </div>);
              })}
            </div>);
          })}

          {weekNeeds.length===0 && <div style={{background:'#fff',borderRadius:13,padding:16,color:'#aaa',fontSize:13,textAlign:'center',boxShadow:'0 2px 10px rgba(0,0,0,0.06)'}}>Noch keine Produkte im Wochenbedarf.</div>}

          {weekNeeds.length>0 && (
            <div style={{background:'#fff',borderRadius:13,overflow:'hidden',boxShadow:'0 2px 10px rgba(0,0,0,0.06)'}}>
              {boughtTotal>0 && <div style={{display:'flex',justifyContent:'space-between',padding:'10px 15px',background:'#e8f5e9'}}><span style={{color:'#3d5c3d',fontWeight:600}}>✓ Bereits gekauft</span><span style={{color:'#3d5c3d',fontWeight:700}}>{fmt(boughtTotal)}</span></div>}
              <div style={{display:'flex',justifyContent:'space-between',padding:'12px 15px',background:'#f7f3ec',fontWeight:700,fontSize:15,borderTop:'2px solid #e8e0d0'}}><span>Gesamt</span><span>{fmt(weekTotal)}</span></div>
              {budget>0 && <div style={{display:'flex',justifyContent:'space-between',padding:'10px 15px',background:remain<0?'#fdecea':'#e8f5e9',fontWeight:700}}><span style={{color:remain<0?'#c06040':'#3d5c3d'}}>{remain<0?'⚠️ Über Budget':'✅ Restbudget'}</span><span style={{color:remain<0?'#c06040':'#3d5c3d'}}>{remain<0?'-':''}{fmt(Math.abs(remain))}</span></div>}
            </div>
          )}
        </>)}

      </main>

      {toastMsg && <div style={{position:'fixed',bottom:'calc(20px + env(safe-area-inset-bottom,0px))',left:'50%',transform:'translateX(-50%)',background:'#3d5c3d',color:'#f7f3ec',padding:'11px 24px',borderRadius:50,fontSize:14,fontWeight:500,boxShadow:'0 4px 20px rgba(0,0,0,0.2)',zIndex:999,whiteSpace:'nowrap'}}>{toastMsg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(BioKauf));
</script>
</body>
</html>
